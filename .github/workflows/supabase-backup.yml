# =============================================================================
# Backup diario de tablas críticas de Supabase
# =============================================================================
# Cron: todos los días a las 03:00 UTC. Exporta las tablas listadas vía la
# REST API de Supabase (PostgREST) usando la SERVICE ROLE KEY (necesaria para
# saltarse RLS y leer todos los negocios). Los JSON se commitean en /backups
# en una rama orphan dedicada para no inflar el historial de main.
name: Supabase backup

on:
  schedule:
    - cron: "0 3 * * *" # 03:00 UTC diario
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  backup:
    runs-on: ubuntu-latest
    env:
      # Tablas críticas a respaldar diariamente. Sin tablas archivo (`*_archivo`)
      # ni auxiliares (rgpd, terminos, dispositivos) que cambian poco y/o son
      # reconstruibles. Si añades un módulo nuevo con datos críticos, añade
      # su tabla aquí.
      TABLES: >-
        perfiles_negocio
        miembros_negocio
        clientes
        contactos_cliente
        finanzas
        documentos
        productos
        citas
        agenda_eventos
        tareas_kanban
        kanban_columnas
        fichajes
        pagos_stripe
        proveedores
        gastos_proveedor
        tpv_ventas
        tpv_venta_items
        stock_movimientos
    steps:
      - name: Checkout backups branch
        uses: actions/checkout@v4
        with:
          ref: backups
          # Si la rama no existe aún, créala manualmente la primera vez:
          #   git checkout --orphan backups && git rm -rf . && \
          #   git commit --allow-empty -m "init backups" && git push -u origin backups
          token: ${{ secrets.GH_PAT }}

      - name: Export tables from Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          # Sin `set -e` global: queremos seguir con las demás tablas si una falla
          # y reportar al final un resumen para diagnosticar.
          set -uo pipefail
          DATE=$(date -u +'%Y-%m-%d')
          DIR="backups/$DATE"
          mkdir -p "$DIR"

          # Sanity check: el secreto debe existir.
          if [[ -z "${SUPABASE_URL:-}" || -z "${SUPABASE_SERVICE_ROLE_KEY:-}" ]]; then
            echo "❌ SUPABASE_URL o SUPABASE_SERVICE_ROLE_KEY no están definidos como secret."
            exit 1
          fi

          # Normaliza URL: quita trailing slash y un /rest/v1 final si por
          # error se guardó incluido en el secret (causa 404 al concatenar).
          BASE="${SUPABASE_URL%/}"
          BASE="${BASE%/rest/v1}"
          BASE="${BASE%/}"

          # Forma del host (sin exponer el secret completo): debe parecer
          # `https://xxx.supabase.co`. Si el host está mal, todas las tablas
          # darán 404 — esto al menos nos permite detectarlo antes.
          HOST="$(echo "$BASE" | sed -E 's|^(https?://[^/]+).*|\1|')"
          echo "ℹ️ Endpoint: ${HOST}/rest/v1/<tabla>"

          # Sondeo previo: si el endpoint base ya devuelve no-200, ni siquiera
          # tiene sentido iterar — aborta con mensaje claro.
          ROOT_HTTP=$(curl -sS -o /dev/null -w "%{http_code}" \
            -H "apikey: $SUPABASE_SERVICE_ROLE_KEY" \
            "$BASE/rest/v1/")
          if [[ "$ROOT_HTTP" != "200" ]]; then
            echo "❌ El endpoint REST no responde 200 (got $ROOT_HTTP)."
            echo "   Comprueba que el secret SUPABASE_URL sea exactamente la URL"
            echo "   del proyecto (sin /rest/v1, sin trailing slash) y que la"
            echo "   service_role key corresponda a ese proyecto."
            exit 1
          fi

          FALLOS=()
          OK=0
          for TABLE in $TABLES; do
            # `Prefer: count=exact` + `Range-Unit: items` para paginar si hace falta
            # (el default de PostgREST es 1000 filas — suficiente para v1).
            HTTP=$(curl -sS -o "$DIR/$TABLE.json" -w "%{http_code}" \
              -H "apikey: $SUPABASE_SERVICE_ROLE_KEY" \
              -H "Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY" \
              -H "Accept: application/json" \
              "$BASE/rest/v1/$TABLE?select=*")

            if [[ "$HTTP" == "200" ]]; then
              SIZE=$(wc -c < "$DIR/$TABLE.json" | tr -d ' ')
              echo "✅ $TABLE — ${SIZE} bytes"
              OK=$((OK+1))
            else
              echo "❌ $TABLE — HTTP $HTTP"
              echo "   respuesta: $(head -c 200 "$DIR/$TABLE.json")"
              rm -f "$DIR/$TABLE.json"
              FALLOS+=("$TABLE($HTTP)")
            fi
          done

          echo ""
          echo "Resumen: $OK ok, ${#FALLOS[@]} fallos."
          if (( ${#FALLOS[@]} > 0 )); then
            echo "Fallos: ${FALLOS[*]}"
            exit 1
          fi

      - name: Upload as workflow artifact (retención 30d)
        uses: actions/upload-artifact@v4
        with:
          name: supabase-backup-${{ github.run_id }}
          path: backups/
          retention-days: 30

      - name: Commit backup to repo
        run: |
          git config user.name  "r3zon-bot"
          git config user.email "bot@r3zon.dev"
          git add backups/
          if git diff --cached --quiet; then
            echo "Sin cambios en backups."
            exit 0
          fi
          git commit -m "chore(backup): supabase snapshot $(date -u +'%Y-%m-%d')"
          git push

      - name: Notify Discord on failure
        if: failure()
        env:
          WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          PAYLOAD=$(jq -n \
            --arg title "❌ Backup Supabase falló" \
            --arg desc  "Revisa el run en GitHub Actions." \
            --arg url   "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            '{embeds:[{title:$title, description:$desc, url:$url, color:15158332}]}')
          curl -sS -H "Content-Type: application/json" -X POST -d "$PAYLOAD" "$WEBHOOK"
