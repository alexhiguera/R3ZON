# =============================================================================
# Escaneo de dependencias vulnerables
# =============================================================================
# Combina dos capas:
#  - npm audit en cada PR/push y semanalmente → rompe build si hay HIGH/CRITICAL.
#  - CodeQL para análisis estático de JS/TS (cobertura semanal).
name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1" # Lunes 06:00 UTC

permissions:
  contents: read
  security-events: write # CodeQL sube alertas a la pestaña Security

jobs:
  npm-audit:
    name: npm audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - name: Install (con lockfile, sin scripts post-install)
        run: npm ci --ignore-scripts
      - name: Audit (falla si hay vulns high/critical)
        run: npm audit --audit-level=high

  codeql:
    name: CodeQL (JS/TS)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
      - uses: github/codeql-action/analyze@v3
        with:
          category: "/language:javascript-typescript"
