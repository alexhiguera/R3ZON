# =============================================================================
# Escaneo de dependencias vulnerables
# =============================================================================
# Combina dos capas:
#  - npm audit en cada PR/push y semanalmente → rompe build si hay HIGH/CRITICAL.
#  - CodeQL para análisis estático de JS/TS (cobertura semanal).
name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1" # Lunes 06:00 UTC

permissions:
  contents: read

jobs:
  npm-audit:
    name: npm audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - name: Install (con lockfile, sin scripts post-install)
        run: npm ci --ignore-scripts
      - name: Audit (falla si hay vulns high/critical)
        run: npm audit --audit-level=high

  # CodeQL — corre como Default Setup desde Settings → Code scanning,
  # no como job de Actions, para no chocar con la configuración avanzada
  # (no se pueden tener las dos). Si quieres reglas custom mueve a Advanced
  # y borra el Default Setup primero.
