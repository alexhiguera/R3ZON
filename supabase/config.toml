# =============================================================================
# Supabase local stack — R3ZON Business OS
# Documentación: https://supabase.com/docs/guides/local-development/cli/config
# =============================================================================
project_id = "r3zon-crm"

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[db.pooler]
enabled = false

[realtime]
enabled = true

[studio]
# Studio se desactiva por defecto porque colima/Docker en macOS suele dar
# problemas de permisos al montar `supabase/snippets`. Para activarlo:
#   - Usar Docker Desktop en vez de colima, o
#   - Reiniciar colima con virtiofs: `colima start --mount-type virtiofs`
# Mientras tanto, conecta con cualquier cliente Postgres a
#   postgresql://postgres:postgres@127.0.0.1:54322/postgres
enabled = false
port = 54323
api_url = "http://127.0.0.1"

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["http://localhost:3000/**"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true
enable_anonymous_sign_ins = false
enable_manual_linking = false

[auth.email]
enable_signup = true
double_confirm_changes = false
enable_confirmations = false
secure_password_change = false
max_frequency = "1s"

[auth.sms]
enable_signup = false
enable_confirmations = false

[edge_runtime]
enabled = false

[analytics]
enabled = false
